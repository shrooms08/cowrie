document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\">Paid. Verified clean.<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:rgba(255,255,255,.5);margin-top:10px;animation:cwFadeUp .5s ease .95s both;\">₦42,500 settled to your account<\u002Fdiv>\n          <button onclick=\"{{ resetMerchant }}\" style=\"margin-top:30px;padding:13px 26px;border:1px solid rgba(255,255,255,.14);border-radius:14px;background:transparent;color:#eef2e6;font-family:'Space Grotesk';font-size:14px;font-weight:500;cursor:pointer;animation:cwFadeUp .5s ease 1.1s both;\">New charge<\u002Fbutton>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div style=\"padding:40px 44px;display:flex;flex-direction:column;gap:18px;\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.4);\">WHAT YOU RECEIVE<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:14px;\">\n          <sc-for list=\"{{ merchantFacts }}\" as=\"f\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex;align-items:center;gap:13px;\">\n              <div style=\"width:38px;height:38px;border-radius:11px;background:rgba(183,242,74,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;\">\n                <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#B7F24A\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n              <\u002Fdiv>\n              <div>\n                <div style=\"font-size:15px;font-weight:500;color:#eef2e6;\">{{ f.title }}<\u002Fdiv>\n                <div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:rgba(255,255,255,.4);margin-top:2px;\">{{ f.sub }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"margin-top:auto;padding:18px;border-radius:16px;background:#0d0f08;border:1px solid rgba(255,255,255,.06);\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,255,255,.4);\">YOU NEVER SEE<\u002Fdiv>\n          <div style=\"font-size:13.5px;color:rgba(255,255,255,.6);margin-top:8px;line-height:1.5;\">The customer's wallet, balance, or identity. Only that the money arrived, in Naira, and is clean.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <div style=\"display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:4px;\">\n    <sc-for list=\"{{ navItems }}\" as=\"n\" hint-placeholder-count=\"4\">\n      <button onclick=\"{{ n.go }}\" style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1px;padding:7px 14px;border-radius:999px;cursor:pointer;border:1px solid {{ n.border }};background:{{ n.bg }};color:{{ n.color }};\">{{ n.label }}<\u002Fbutton>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { screen:'home', showBalance:true, balanceVal:0, merchantStage:'invoice', payStage:'review', revealStep:0 };\n\n  componentDidMount(){\n    this._countTo(2480, 1300);\n  }\n  _countTo(target, dur){\n    const start = performance.now();\n    const tick = (t)=>{\n      const p = Math.min(1, (t-start)/dur);\n      const e = 1 - Math.pow(1-p, 3);\n      this.setState({ balanceVal: target*e });\n      if(p<1) this._raf = requestAnimationFrame(tick);\n    };\n    this._raf = requestAnimationFrame(tick);\n  }\n\n  go(screen){ this.setState({ screen }); }\n\n  pay(){\n    this.setState({ payStage:'paying', merchantStage:'paid' });\n    clearTimeout(this._payT);\n    this._payT = setTimeout(()=> this.setState({ payStage:'done' }), 1500);\n  }\n\n  renderVals(){\n    const s = this.state;\n    const target = 2480;\n    const done = s.balanceVal >= target - 0.5;\n    const v = done ? target : s.balanceVal;\n    const intDisplay = done ? '2,480' : Math.floor(v).toLocaleString('en-US');\n    const centsDisplay = done ? '00' : Math.floor((v - Math.floor(v))*100).toString().padStart(2,'0');\n\n    const navBtn = (key,label)=>({\n      label, go:()=>this.go(key),\n      bg: s.screen===key ? 'rgba(183,242,74,.12)' : 'rgba(255,255,255,.03)',\n      border: s.screen===key ? 'rgba(183,242,74,.35)' : 'rgba(255,255,255,.1)',\n      color: s.screen===key ? '#B7F24A' : 'rgba(255,255,255,.55)',\n    });\n\n    return {\n      isHome: s.screen==='home', isPay: s.screen==='pay', isPrivacy: s.screen==='privacy', isMerchant: s.screen==='merchant',\n      showPhone: s.screen!=='merchant',\n      showBalance: s.showBalance, hideBalance: !s.showBalance,\n      balanceBlur: s.showBalance ? 'blur(0px)' : 'blur(16px)',\n      toggleEye: ()=> this.setState(st=>({ showBalance: !st.showBalance })),\n      intDisplay, centsDisplay,\n      usdcLine: v.toFixed(4),\n      goPay: ()=>this.go('pay'), goReceive: ()=>this.go('home'), goPrivacy: ()=>this.go('privacy'),\n      goMerchant: ()=>this.go('merchant'), goHome: ()=>this.go('home'),\n\n      activity: [\n        { initial:'K', name:'Kwame Mensah', meta:'Today · 09:24', amount:'+$120.00', sub:'received', color:'#B7F24A' },\n        { initial:'B', name:'Buka Express', meta:'Yesterday · ₦18,400', amount:'−$11.90', sub:'paid · clean', color:'#eef2e6' },\n        { initial:'+', name:'Top up', meta:'Mon · bank transfer', amount:'+$500.00', sub:'settled', color:'#eef2e6' },\n      ],\n\n      // merchant\n      merchantInvoice: s.merchantStage==='invoice', merchantWaiting: s.merchantStage==='waiting', merchantPaid: s.merchantStage==='paid',\n      createInvoice: ()=> this.setState({ merchantStage:'waiting' }),\n      resetMerchant: ()=> this.setState({ merchantStage:'invoice' }),\n      // pay\n      payReview: s.payStage==='review', payPaying: s.payStage==='paying', payDone: s.payStage==='done',\n      doPay: ()=> this.pay(),\n      resetPay: ()=> this.setState({ payStage:'review' }),\n\n      explorerRows: [\n        { field:'Amount', value:'•••• shielded', color:'rgba(255,255,255,.4)', delay:'.1s' },\n        { field:'Sender', value:'—', color:'rgba(255,255,255,.4)', delay:'.25s' },\n        { field:'Recipient', value:'—', color:'rgba(255,255,255,.4)', delay:'.4s' },\n        { field:'Balance', value:'•••• hidden', color:'rgba(255,255,255,.4)', delay:'.55s' },\n        { field:'Memo / identity', value:'—', color:'rgba(255,255,255,.4)', delay:'.7s' },\n        { field:'Proof', value:'valid ✓', color:'#B7F24A', delay:'.85s' },\n      ],\n      merchantFacts: [\n        { title:'₦42,500 in your local currency', sub:'no crypto to manage' },\n        { title:'Funds verified clean', sub:'zk compliance proof attached' },\n        { title:'Settled instantly · $0.00 fee', sub:'no chargebacks' },\n      ],\n\n      navItems: [ navBtn('home','HOME'), navBtn('pay','PAY'), navBtn('merchant','MERCHANT'), navBtn('privacy','PRIVACY') ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
